<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WorldGate VR — The Enigma</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #000;
    color: #fff;
    font-family: 'Cormorant Garamond', serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    position: relative;
  }

  .stars {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    z-index: 0;
  }

  .star {
    position: absolute;
    background: #fff;
    border-radius: 50%;
    animation: twinkle var(--d) ease-in-out infinite;
    opacity: 0;
  }

  @keyframes twinkle {
    0%, 100% { opacity: 0; }
    50% { opacity: var(--o); }
  }

  .content {
    position: relative;
    z-index: 2;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0;
    padding: 2rem;
    text-align: center;
    max-width: 680px;
    width: 100%;
  }

  .globe-container {
    position: relative;
    width: 180px;
    height: 180px;
    margin-bottom: 2.5rem;
  }

  .globe-glow {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 220px;
    height: 220px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(212,175,55,0.15) 0%, rgba(212,175,55,0.05) 50%, transparent 70%);
    animation: pulse 3s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { transform: translate(-50%, -50%) scale(1); opacity: 0.6; }
    50% { transform: translate(-50%, -50%) scale(1.1); opacity: 1; }
  }

  svg.globe {
    width: 180px;
    height: 180px;
    animation: rotate 20s linear infinite;
    filter: drop-shadow(0 0 20px rgba(212,175,55,0.4));
  }

  @keyframes rotate {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
  }

  .wordmark {
    font-family: 'Cinzel', serif;
    font-size: clamp(2rem, 6vw, 3.2rem);
    font-weight: 600;
    letter-spacing: 0.15em;
    color: #D4AF37;
    text-shadow: 0 0 40px rgba(212,175,55,0.3);
    margin-bottom: 0.3rem;
    animation: fadeUp 1.2s ease forwards;
    opacity: 0;
    animation-delay: 0.3s;
  }

  .sub {
    font-family: 'Cinzel', serif;
    font-size: clamp(0.65rem, 1.8vw, 0.8rem);
    letter-spacing: 0.5em;
    color: rgba(212,175,55,0.5);
    text-transform: uppercase;
    margin-bottom: 3rem;
    animation: fadeUp 1.2s ease forwards;
    opacity: 0;
    animation-delay: 0.6s;
  }

  .divider {
    width: 120px;
    height: 1px;
    background: linear-gradient(to right, transparent, rgba(212,175,55,0.6), transparent);
    margin-bottom: 2rem;
    animation: fadeUp 1.2s ease forwards;
    opacity: 0;
    animation-delay: 0.8s;
  }

  .enigma-text {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-weight: 300;
    font-size: clamp(1.1rem, 3vw, 1.4rem);
    color: rgba(255,255,255,0.7);
    line-height: 1.7;
    margin-bottom: 0.8rem;
    max-width: 480px;
    animation: fadeUp 1.2s ease forwards;
    opacity: 0;
    animation-delay: 1s;
  }

  .enigma-sub {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 300;
    font-size: clamp(0.9rem, 2vw, 1rem);
    color: rgba(255,255,255,0.35);
    margin-bottom: 3rem;
    letter-spacing: 0.05em;
    animation: fadeUp 1.2s ease forwards;
    opacity: 0;
    animation-delay: 1.2s;
  }

  .form {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 1rem;
    width: 100%;
    max-width: 400px;
    animation: fadeUp 1.2s ease forwards;
    opacity: 0;
    animation-delay: 1.4s;
  }

  .input-wrap {
    position: relative;
    width: 100%;
  }

  .email-input {
    width: 100%;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(212,175,55,0.25);
    border-radius: 2px;
    padding: 1rem 1.5rem;
    color: #fff;
    font-family: 'Cormorant Garamond', serif;
    font-size: 1rem;
    letter-spacing: 0.05em;
    outline: none;
    transition: border-color 0.3s, background 0.3s;
  }

  .email-input::placeholder {
    color: rgba(255,255,255,0.25);
    font-style: italic;
  }

  .email-input:focus {
    border-color: rgba(212,175,55,0.6);
    background: rgba(212,175,55,0.04);
  }

  .cta-btn {
    width: 100%;
    background: transparent;
    border: 1px solid rgba(212,175,55,0.5);
    color: #D4AF37;
    font-family: 'Cinzel', serif;
    font-size: 0.75rem;
    letter-spacing: 0.3em;
    padding: 1rem 2rem;
    cursor: pointer;
    transition: all 0.3s;
    border-radius: 2px;
    text-transform: uppercase;
  }

  .cta-btn:hover {
    background: rgba(212,175,55,0.08);
    border-color: rgba(212,175,55,0.8);
    box-shadow: 0 0 20px rgba(212,175,55,0.1);
  }

  .cta-btn:active { transform: scale(0.98); }

  .success-msg {
    display: none;
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: 1rem;
    color: rgba(212,175,55,0.8);
    letter-spacing: 0.05em;
    text-align: center;
    padding: 1rem;
  }

  .footer-line {
    position: fixed;
    bottom: 2rem;
    font-family: 'Cinzel', serif;
    font-size: 0.6rem;
    letter-spacing: 0.4em;
    color: rgba(255,255,255,0.12);
    text-transform: uppercase;
    animation: fadeUp 1.2s ease forwards;
    opacity: 0;
    animation-delay: 2s;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .ring {
    position: absolute;
    border-radius: 50%;
    border: 1px solid rgba(212,175,55,0.1);
    animation: expand 4s ease-out infinite;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
  }

  .ring:nth-child(1) { width: 220px; height: 220px; animation-delay: 0s; }
  .ring:nth-child(2) { width: 300px; height: 300px; animation-delay: 1s; }
  .ring:nth-child(3) { width: 380px; height: 380px; animation-delay: 2s; }

  @keyframes expand {
    0% { opacity: 0.4; transform: translate(-50%, -50%) scale(0.9); }
    100% { opacity: 0; transform: translate(-50%, -50%) scale(1.2); }
  }
</style>
</head>
<body>

<div class="stars" id="stars"></div>

<div style="position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);pointer-events:none;z-index:1;">
  <div class="ring"></div>
  <div class="ring"></div>
  <div class="ring"></div>
</div>

<div class="content">

  <div class="globe-container">
    <div class="globe-glow"></div>
    <svg class="globe" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <radialGradient id="g1" cx="35%" cy="35%">
          <stop offset="0%" stop-color="#F5D78A"/>
          <stop offset="40%" stop-color="#D4AF37"/>
          <stop offset="100%" stop-color="#7A5C00"/>
        </radialGradient>
        <clipPath id="clip"><circle cx="50" cy="50" r="44"/></clipPath>
      </defs>
      <circle cx="50" cy="50" r="44" fill="url(#g1)" opacity="0.15" stroke="#D4AF37" stroke-width="0.5"/>
      <g clip-path="url(#clip)" stroke="#D4AF37" stroke-width="0.4" fill="none" opacity="0.6">
        <ellipse cx="50" cy="50" rx="44" ry="44"/>
        <ellipse cx="50" cy="50" rx="30" ry="44"/>
        <ellipse cx="50" cy="50" rx="15" ry="44"/>
        <ellipse cx="50" cy="50" rx="5" ry="44"/>
        <line x1="6" y1="50" x2="94" y2="50"/>
        <line x1="6" y1="35" x2="94" y2="35"/>
        <line x1="6" y1="20" x2="94" y2="20"/>
        <line x1="6" y1="65" x2="94" y2="65"/>
        <line x1="6" y1="80" x2="94" y2="80"/>
      </g>
      <circle cx="50" cy="50" r="44" fill="none" stroke="#D4AF37" stroke-width="0.8" opacity="0.8"/>
    </svg>
  </div>

  <div class="wordmark">WorldGate VR</div>
  <div class="sub">The Enigma</div>
  <div class="divider"></div>

  <div class="enigma-text">
    Something is opening between worlds.
  </div>
  <div class="enigma-sub">
    We will find you when the gate is ready.
  </div>

  <div class="form" id="form-wrap">
    <div class="input-wrap">
      <input class="email-input" type="email" id="email" placeholder="your@email.com" />
    </div>
    <button class="cta-btn" onclick="submit()">Request Access</button>
  </div>

  <div class="success-msg" id="success">
    You are known to the gate. We will find you. ✦
  </div>

</div>

<div class="footer-line">worldgatevr.com &nbsp;·&nbsp; peace purposes only</div>

<script>
  const s = document.getElementById('stars');
  for (let i = 0; i < 120; i++) {
    const d = document.createElement('div');
    d.className = 'star';
    const size = Math.random() * 2 + 0.5;
    d.style.cssText = `
      width:${size}px;height:${size}px;
      top:${Math.random()*100}%;
      left:${Math.random()*100}%;
      --d:${Math.random()*4+2}s;
      --o:${Math.random()*0.7+0.1};
      animation-delay:${Math.random()*4}s;
    `;
    s.appendChild(d);
  }

  function submit() {
    const e = document.getElementById('email');
    if (!e.value || !e.value.includes('@')) {
      e.style.borderColor = 'rgba(200,80,80,0.6)';
      setTimeout(() => e.style.borderColor = 'rgba(212,175,55,0.25)', 1000);
      return;
    }
    document.getElementById('form-wrap').style.display = 'none';
    document.getElementById('success').style.display = 'block';
  }

  document.getElementById('email').addEventListener('keydown', (e) => {
    if (e.key === 'Enter') submit();
  });
</script>

</body>
</html>

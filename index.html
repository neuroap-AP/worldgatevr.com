<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WorldGate VR — The Enigma</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #000;
    color: #fff;
    font-family: 'Cormorant Garamond', serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    position: relative;
  }

  .stars {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    z-index: 0;
  }

  .star {
    position: absolute;
    background: #fff;
    border-radius: 50%;
    animation: twinkle var(--d) ease-in-out infinite;
    opacity: 0;
  }

  @keyframes twinkle {
    0%, 100% { opacity: 0; }
    50% { opacity: var(--o); }
  }

  .content {
    position: relative;
    z-index: 2;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 2rem;
    text-align: center;
    max-width: 680px;
    width: 100%;
  }

  #globe-canvas {
    width: 180px;
    height: 180px;
    margin-bottom: 2.5rem;
    display: block;
  }

  .globe-wrap {
    position: relative;
    width: 180px;
    height: 180px;
    margin-bottom: 2.5rem;
  }

  .globe-glow {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 220px;
    height: 220px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(212,175,55,0.18) 0%, rgba(212,175,55,0.06) 50%, transparent 70%);
    animation: pulse 3s ease-in-out infinite;
    pointer-events: none;
    z-index: 1;
  }

  canvas {
    position: relative;
    z-index: 2;
    border-radius: 50%;
  }

  @keyframes pulse {
    0%, 100% { transform: translate(-50%, -50%) scale(1); opacity: 0.6; }
    50% { transform: translate(-50%, -50%) scale(1.1); opacity: 1; }
  }

  .ring {
    position: fixed;
    border-radius: 50%;
    border: 1px solid rgba(212,175,55,0.08);
    animation: expand 5s ease-out infinite;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    pointer-events: none;
    z-index: 1;
  }

  .ring:nth-child(1) { width: 240px; height: 240px; animation-delay: 0s; }
  .ring:nth-child(2) { width: 340px; height: 340px; animation-delay: 1.5s; }
  .ring:nth-child(3) { width: 440px; height: 440px; animation-delay: 3s; }

  @keyframes expand {
    0% { opacity: 0.5; transform: translate(-50%, -50%) scale(0.9); }
    100% { opacity: 0; transform: translate(-50%, -50%) scale(1.15); }
  }

  .wordmark {
    font-family: 'Cinzel', serif;
    font-size: clamp(2rem, 6vw, 3.2rem);
    font-weight: 600;
    letter-spacing: 0.15em;
    color: #D4AF37;
    text-shadow: 0 0 40px rgba(212,175,55,0.25);
    margin-bottom: 0.3rem;
    animation: fadeUp 1.2s ease forwards;
    opacity: 0;
    animation-delay: 0.3s;
  }

  .sub {
    font-family: 'Cinzel', serif;
    font-size: clamp(0.65rem, 1.8vw, 0.8rem);
    letter-spacing: 0.5em;
    color: rgba(212,175,55,0.5);
    text-transform: uppercase;
    margin-bottom: 3rem;
    animation: fadeUp 1.2s ease forwards;
    opacity: 0;
    animation-delay: 0.6s;
  }

  .divider {
    width: 120px;
    height: 1px;
    background: linear-gradient(to right, transparent, rgba(212,175,55,0.6), transparent);
    margin-bottom: 2rem;
    animation: fadeUp 1.2s ease forwards;
    opacity: 0;
    animation-delay: 0.8s;
  }

  .enigma-text {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-weight: 300;
    font-size: clamp(1.1rem, 3vw, 1.4rem);
    color: rgba(255,255,255,0.7);
    line-height: 1.7;
    margin-bottom: 0.8rem;
    max-width: 480px;
    animation: fadeUp 1.2s ease forwards;
    opacity: 0;
    animation-delay: 1s;
  }

  .enigma-sub {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 300;
    font-size: clamp(0.9rem, 2vw, 1rem);
    color: rgba(255,255,255,0.35);
    margin-bottom: 3rem;
    letter-spacing: 0.05em;
    animation: fadeUp 1.2s ease forwards;
    opacity: 0;
    animation-delay: 1.2s;
  }

  .form {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 1rem;
    width: 100%;
    max-width: 400px;
    animation: fadeUp 1.2s ease forwards;
    opacity: 0;
    animation-delay: 1.4s;
  }

  .email-input {
    width: 100%;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(212,175,55,0.25);
    border-radius: 2px;
    padding: 1rem 1.5rem;
    color: #fff;
    font-family: 'Cormorant Garamond', serif;
    font-size: 1rem;
    letter-spacing: 0.05em;
    outline: none;
    transition: border-color 0.3s, background 0.3s;
  }

  .email-input::placeholder { color: rgba(255,255,255,0.25); font-style: italic; }
  .email-input:focus { border-color: rgba(212,175,55,0.6); background: rgba(212,175,55,0.04); }

  .cta-btn {
    width: 100%;
    background: transparent;
    border: 1px solid rgba(212,175,55,0.5);
    color: #D4AF37;
    font-family: 'Cinzel', serif;
    font-size: 0.75rem;
    letter-spacing: 0.3em;
    padding: 1rem 2rem;
    cursor: pointer;
    transition: all 0.3s;
    border-radius: 2px;
    text-transform: uppercase;
  }

  .cta-btn:hover { background: rgba(212,175,55,0.08); border-color: rgba(212,175,55,0.8); }
  .cta-btn:active { transform: scale(0.98); }

  .success-msg {
    display: none;
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: 1rem;
    color: rgba(212,175,55,0.8);
    letter-spacing: 0.05em;
    text-align: center;
    padding: 1rem;
  }

  .footer-line {
    position: fixed;
    bottom: 2rem;
    font-family: 'Cinzel', serif;
    font-size: 0.6rem;
    letter-spacing: 0.4em;
    color: rgba(255,255,255,0.12);
    text-transform: uppercase;
    z-index: 3;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }
</style>
</head>
<body>

<div class="stars" id="stars"></div>

<div style="position:fixed;top:50%;left:50%;pointer-events:none;z-index:1;">
  <div class="ring"></div>
  <div class="ring"></div>
  <div class="ring"></div>
</div>

<div class="content">

  <div class="globe-wrap">
    <div class="globe-glow"></div>
    <canvas id="globe-canvas" width="180" height="180"></canvas>
  </div>

  <div class="wordmark">WorldGate VR</div>
  <div class="sub">The Enigma</div>
  <div class="divider"></div>

  <div class="enigma-text">Something is opening between worlds.</div>
  <div class="enigma-sub">We will find you when the gate is ready.</div>

  <div class="form" id="form-wrap">
    <input class="email-input" type="email" id="email" placeholder="your@email.com" />
    <button class="cta-btn" onclick="submitForm()">Request Access</button>
  </div>

  <div class="success-msg" id="success">
    You are known to the gate. We will find you. ✦
  </div>

</div>

<div class="footer-line">worldgatevr.com &nbsp;·&nbsp; peace purposes only</div>

<script>
  // Stars
  const s = document.getElementById('stars');
  for (let i = 0; i < 120; i++) {
    const d = document.createElement('div');
    d.className = 'star';
    const size = Math.random() * 2 + 0.5;
    d.style.cssText = `width:${size}px;height:${size}px;top:${Math.random()*100}%;left:${Math.random()*100}%;--d:${Math.random()*4+2}s;--o:${Math.random()*0.7+0.1};animation-delay:${Math.random()*4}s;`;
    s.appendChild(d);
  }

  // Three.js Globe
  const canvas = document.getElementById('globe-canvas');
  const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
  renderer.setSize(180, 180);
  renderer.setPixelRatio(window.devicePixelRatio);
  renderer.setClearColor(0x000000, 0);

  const scene = new THREE.Scene();
  const camera = new THREE.PerspectiveCamera(45, 1, 0.1, 100);
  camera.position.z = 2.8;

  const gold = 0xD4AF37;
  const goldDim = 0x7A5C00;

  // Sphere wireframe — latitude/longitude lines
  const sphereGeo = new THREE.SphereGeometry(1, 24, 16);
  const wireframe = new THREE.WireframeGeometry(sphereGeo);
  const lineMat = new THREE.LineBasicMaterial({ color: gold, transparent: true, opacity: 0.35 });
  const globe = new THREE.LineSegments(wireframe, lineMat);
  scene.add(globe);

  // Outer glow sphere
  const glowGeo = new THREE.SphereGeometry(1.02, 32, 32);
  const glowMat = new THREE.MeshBasicMaterial({
    color: gold,
    transparent: true,
    opacity: 0.04,
    side: THREE.FrontSide
  });
  const glowSphere = new THREE.Mesh(glowGeo, glowMat);
  scene.add(glowSphere);

  // Equator ring — slightly brighter
  const equatorGeo = new THREE.TorusGeometry(1, 0.003, 8, 128);
  const equatorMat = new THREE.MeshBasicMaterial({ color: gold, transparent: true, opacity: 0.7 });
  const equator = new THREE.Mesh(equatorGeo, equatorMat);
  scene.add(equator);

  // Ambient light
  scene.add(new THREE.AmbientLight(0xD4AF37, 0.3));

  // Animation
  let frame = 0;
  function animate() {
    requestAnimationFrame(animate);
    frame++;
    globe.rotation.y += 0.004;
    glowSphere.rotation.y += 0.004;
    equator.rotation.y += 0.004;

    // subtle pulse on opacity
    lineMat.opacity = 0.30 + Math.sin(frame * 0.02) * 0.08;

    renderer.render(scene, camera);
  }
  animate();

  // Form
  async function submitForm() {
    const e = document.getElementById('email');
    if (!e.value || !e.value.includes('@')) {
      e.style.borderColor = 'rgba(200,80,80,0.6)';
      setTimeout(() => e.style.borderColor = 'rgba(212,175,55,0.25)', 1000);
      return;
    }
    try {
      const res = await fetch('https://formspree.io/f/xeerrjaq', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
        body: JSON.stringify({ email: e.value })
      });
      if (res.ok) {
        document.getElementById('form-wrap').style.display = 'none';
        document.getElementById('success').style.display = 'block';
      }
    } catch(err) {
      document.getElementById('form-wrap').style.display = 'none';
      document.getElementById('success').style.display = 'block';
    }
  }

  document.getElementById('email').addEventListener('keydown', e => {
    if (e.key === 'Enter') submitForm();
  });
</script>

</body>
</html>
